name = "escard-site"
compatibility_date = "2024-09-23"
pages_build_output_dir = "public"

# Depois de criar o banco D1 (wrangler d1 create escard-db), troque o
# database_id abaixo pelo id real retornado, e configure o mesmo binding
# "DB" no painel da Cloudflare em Settings → Functions → D1 database bindings.
[[d1_databases]]
binding = "DB"
database_name = "escard-db"
database_id = "COLOQUE_AQUI_O_ID_DO_BANCO"
