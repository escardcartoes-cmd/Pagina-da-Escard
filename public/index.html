<style id="escard-css">
/* ============================================================
   DESIGN TOKENS
   Baseado no design v2 (premium) — paleta navy/blue/amber
   ============================================================ */
:root {
  --white:      #FFFFFF;
  --offwhite:   #F7F8FC;
  --blue:       #1B4FD8;
  --blue-dark:  #1340B8;
  --blue-light: #3B6EF8;
  --blue-pale:  #EEF2FF;
  --amber:      #F59E0B;
  --amber-dark: #D97706;
  --amber-pale: #FFFBEB;
  --green:      #10B981;
  --green-pale: #ECFDF5;
  --navy:       #0F1C3F;
  --navy-mid:   #1E3A6E;
  --gray-50:    #F8FAFC;
  --gray-100:   #F1F5F9;
  --gray-200:   #E2E8F0;
  --gray-300:   #CBD5E1;
  --gray-400:   #94A3B8;
  --gray-500:   #64748B;
  --gray-600:   #475569;
  --gray-700:   #334155;
  --gray-800:   #1E293B;

  --font-display: 'Sora', sans-serif;
  --font-body:    'Inter', sans-serif;

  --shadow-sm:    0 1px 3px rgba(15,28,63,.06), 0 1px 2px rgba(15,28,63,.04);
  --shadow-md:    0 4px 16px rgba(15,28,63,.08), 0 2px 4px rgba(15,28,63,.04);
  --shadow-lg:    0 12px 40px rgba(15,28,63,.10), 0 4px 8px rgba(15,28,63,.06);
  --shadow-xl:    0 24px 64px rgba(15,28,63,.12), 0 8px 16px rgba(15,28,63,.08);
  --shadow-blue:  0 8px 28px rgba(27,79,216,.35);
  --shadow-amber: 0 8px 24px rgba(245,158,11,.35);

  --r8:  8px;
  --r10: 10px;
  --r12: 12px;
  --r14: 14px;
  --r16: 16px;
  --r20: 20px;
  --r24: 24px;
  --r-full: 9999px;

  --transition: .22s ease;
}

/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--font-body);
  background: var(--white);
  color: var(--navy);
  line-height: 1.6;
  overflow-x: hidden;
}
img { max-width: 100%; display: block; }
a { text-decoration: none; color: inherit; }
ul { list-style: none; }
button { cursor: pointer; font-family: var(--font-body); }
input, select, textarea { font-family: var(--font-body); }

.container { max-width: 1240px; margin: 0 auto; padding: 0 28px; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--gray-100); }
::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 3px; }

/* Acessibilidade: foco visível */
a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
  outline: 2px solid var(--blue);
  outline-offset: 2px;
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
}

/* ============================================================
   ANIMAÇÕES
   ============================================================ */
@keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }
@keyframes fadeUp   { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes float    { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
@keyframes pulse    { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .5; transform: scale(1.4); } }
@keyframes cardSpin {
  0%   { transform: perspective(1000px) rotateY(0deg) rotateX(3deg); }
  50%  { transform: perspective(1000px) rotateY(4deg) rotateX(-2deg); }
  100% { transform: perspective(1000px) rotateY(0deg) rotateX(3deg); }
}

.page-in { animation: fadeIn .4s ease; }
.fade-up { opacity: 0; transform: translateY(24px); transition: opacity .55s ease, transform .55s ease; }
.fade-up.vis { opacity: 1; transform: translateY(0); }

.mesh-bg {
  background:
    radial-gradient(ellipse at 20% 50%, rgba(27,79,216,.12) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(245,158,11,.08) 0%, transparent 45%),
    radial-gradient(ellipse at 60% 80%, rgba(139,92,246,.08) 0%, transparent 45%),
    var(--offwhite);
}

.lift { transition: transform .22s ease, box-shadow .22s ease; }
.lift:hover { transform: translateY(-6px); box-shadow: var(--shadow-lg); }

.card-stripe { position: relative; overflow: hidden; }
.card-stripe::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--blue), var(--amber));
  border-radius: var(--r20) var(--r20) 0 0;
  opacity: 0; transition: opacity .22s ease;
}
.card-stripe:hover::before { opacity: 1; }

.num-grad {
  background: linear-gradient(135deg, var(--blue), var(--amber));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

.tag {
  display: inline-flex; align-items: center;
  font-size: 11px; font-weight: 700;
  padding: 4px 10px; border-radius: var(--r-full);
}

.text-gradient {
  background: linear-gradient(135deg, var(--blue), var(--blue-light));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ============================================================
   BOTÕES
   ============================================================ */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  font-weight: 700; border: none; cursor: pointer;
  transition: all .2s ease; white-space: nowrap;
  font-family: var(--font-body);
  text-decoration: none;
}
.btn-md { font-size: 15px; padding: 13px 26px; border-radius: var(--r12); }
.btn-sm { font-size: 14px; padding: 10px 20px; border-radius: var(--r8); }
.btn-lg { font-size: 16px; padding: 16px 34px; border-radius: var(--r16); }
.btn-block { width: 100%; justify-content: center; }

.btn-primary { background: linear-gradient(135deg, var(--blue), var(--blue-light)); color: white; box-shadow: var(--shadow-blue); }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(27,79,216,.5); }

.btn-amber { background: linear-gradient(135deg, var(--amber), var(--amber-dark)); color: white; box-shadow: var(--shadow-amber); }
.btn-amber:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(245,158,11,.5); }

.btn-outline { background: transparent; color: var(--navy); border: 1.5px solid var(--gray-200); }
.btn-outline:hover { border-color: var(--blue); color: var(--blue); }

.btn-ghost { background: rgba(27,79,216,.06); color: var(--blue); }

.btn-white { background: white; color: var(--navy); box-shadow: var(--shadow-md); }

.btn-whatsapp { background: #25D366; color: white; box-shadow: 0 4px 16px rgba(37,211,102,.35); }
.btn-whatsapp:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(37,211,102,.5); }

/* ============================================================
   NAVBAR
   ============================================================ */
.navbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  background: rgba(255,255,255,.95);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(27,79,216,.08);
  transition: all .3s ease;
}
.navbar.scrolled { background: rgba(255,255,255,.97); border-bottom-color: var(--gray-200); box-shadow: var(--shadow-md); }
.nav-inner { display: flex; align-items: center; height: 68px; gap: 40px; }
.nav-logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; background: none; border: none; cursor: pointer; padding: 0; }
.nav-logo-mark {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--blue), var(--blue-light));
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-weight: 900; font-size: 15px; color: white;
  box-shadow: 0 4px 12px rgba(27,79,216,.35);
}
.nav-logo-text { font-family: var(--font-display); font-weight: 800; font-size: 18px; color: var(--navy); letter-spacing: -0.5px; }
.nav-logo-text span { color: var(--blue); }
.nav-logo-img { height: 38px; width: auto; display: block; }
.footer-logo-selo { background: white; padding: 12px 18px; border-radius: var(--r12); box-shadow: var(--shadow-md); }
.footer-logo-img { height: 40px; width: auto; display: block; }

.nav-links { display: flex; align-items: center; gap: 2px; flex: 1; justify-content: center; }
.nav-link {
  background: none; border: none; cursor: pointer;
  font-size: 15px; font-weight: 600; padding: 8px 14px; border-radius: var(--r8);
  color: var(--navy); transition: all .18s; font-family: inherit;
}
.nav-link:hover { color: var(--blue); background: var(--blue-pale); }
.nav-link.active { color: var(--blue); font-weight: 700; background: var(--blue-pale); }

/* Dropdown "Soluções" */
.nav-dropdown { position: relative; }
.nav-dropdown-toggle { display: inline-flex; align-items: center; gap: 4px; }
.nav-dropdown-toggle .caret { transition: transform .2s; }
.nav-dropdown:hover .nav-dropdown-toggle .caret,
.nav-dropdown.open .nav-dropdown-toggle .caret { transform: rotate(180deg); }
.nav-dropdown-menu {
  position: absolute; top: calc(100% + 8px); left: 50%; transform: translateX(-50%) translateY(8px);
  min-width: 290px; background: #fff; border: 1px solid var(--gray-200); border-radius: var(--r12);
  box-shadow: var(--shadow-lg); padding: 8px; opacity: 0; visibility: hidden; transition: all .18s; z-index: 1000;
}
.nav-dropdown:hover .nav-dropdown-menu,
.nav-dropdown.open .nav-dropdown-menu { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
.nav-dd-item {
  display: flex; align-items: center; gap: 12px; width: 100%; text-align: left;
  background: none; border: none; cursor: pointer; padding: 11px 12px; border-radius: var(--r8); transition: background .15s;
}
.nav-dd-item:hover { background: var(--blue-pale); }
.nav-dd-icon {
  width: 38px; height: 38px; flex-shrink: 0; border-radius: var(--r8);
  display: flex; align-items: center; justify-content: center; font-size: 19px;
}
.nav-dd-text { display: flex; flex-direction: column; }
.nav-dd-title { font-size: 14.5px; font-weight: 700; color: var(--navy); }
.nav-dd-sub { font-size: 12.5px; color: var(--gray-500); margin-top: 1px; }

/* Sub-grupo "Soluções" no menu mobile */
.mobile-dd-label { font-size: 13px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: .5px; padding: 18px 0 6px; }
.mobile-dd-item { padding-left: 14px !important; font-size: 16px !important; }

.nav-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.nav-area-link {
  font-size: 14px; font-weight: 600; color: var(--navy);
  padding: 9px 16px; border-radius: var(--r8); border: 1px solid var(--gray-200);
  transition: all .18s; white-space: nowrap;
}
.nav-area-link:hover { border-color: var(--blue); color: var(--blue); }

.nav-hamburger { display: none; flex-direction: column; gap: 5px; background: none; border: none; padding: 8px; margin-left: auto; }
.nav-hamburger span { display: block; width: 22px; height: 2px; background: var(--navy); border-radius: 2px; }

.mobile-menu {
  position: fixed; inset: 0; z-index: 999; background: white;
  padding: 80px 24px 40px; display: flex; flex-direction: column; gap: 4px;
}
.mobile-menu[hidden] { display: none; }
.mobile-menu-close {
  position: absolute; top: 20px; right: 20px; width: 44px; height: 44px;
  background: var(--gray-100); border-radius: var(--r8); border: none; font-size: 20px; cursor: pointer;
}
.mobile-menu-link {
  background: none; border: none; border-bottom: 1px solid var(--gray-100);
  color: var(--navy); font-size: 18px; font-weight: 600; padding: 16px 0; text-align: left; cursor: pointer;
}

/* ============================================================
   SECTION HEADER
   ============================================================ */
.sh { text-align: center; margin-bottom: 60px; }
.sh.left { text-align: left; }
.sh-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--blue); margin-bottom: 14px;
}
.sh.dark .sh-eyebrow { color: rgba(255,255,255,.5); }
.sh-eyebrow-dash { width: 20px; height: 2px; background: var(--blue); border-radius: 2px; display: block; }
.sh.dark .sh-eyebrow-dash { background: rgba(255,255,255,.3); }
.sh-title {
  font-family: var(--font-display); font-size: clamp(28px,3.2vw,44px);
  font-weight: 900; line-height: 1.12; letter-spacing: -1.2px;
  color: var(--navy); margin-bottom: 14px;
}
.sh.dark .sh-title { color: white; }
.sh-sub { font-size: 17px; line-height: 1.7; color: var(--gray-500); max-width: 580px; margin: 0 auto; }
.sh.left .sh-sub { margin: 0; }
.sh.dark .sh-sub { color: rgba(255,255,255,.6); }

/* ============================================================
   HERO
   ============================================================ */
.hero { min-height: 100vh; display: flex; align-items: center; padding-top: 68px; overflow: hidden; position: relative; }
.hero-blob-1 { position: absolute; top: -10%; right: -5%; width: 700px; height: 700px; background: radial-gradient(circle, rgba(27,79,216,.12), transparent 65%); border-radius: 50%; pointer-events: none; }
.hero-blob-2 { position: absolute; bottom: 5%; left: -8%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(245,158,11,.08), transparent 65%); border-radius: 50%; pointer-events: none; }
.hero-inner { max-width: 1240px; margin: 0 auto; padding: 80px 28px; width: 100%; position: relative; z-index: 1; }
.hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 72px; align-items: center; }
.hero-badge {
  display: inline-flex; align-items: center; gap: 10px;
  background: white; border: 1px solid rgba(27,79,216,.15);
  border-radius: var(--r-full); padding: 7px 16px 7px 10px;
  margin-bottom: 28px; box-shadow: 0 2px 12px rgba(27,79,216,.1);
}
.hero-badge-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
.hero-badge-text { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; color: var(--blue); letter-spacing: 0.3px; }
.hero-badge-text svg { color: var(--amber); }
.hero-title {
  font-family: var(--font-display); font-size: clamp(32px,4vw,52px);
  font-weight: 900; line-height: 1.12; letter-spacing: -1.5px; color: var(--navy); margin-bottom: 22px;
}
.hero-line { display: block; }
.hero-line.text-gradient { margin-top: 6px; }
.hero-sub { font-size: 18px; line-height: 1.68; color: var(--gray-500); margin-bottom: 36px; max-width: 500px; }
.hero-cta-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 44px; }
.hero-social-proof {
  display: flex; align-items: center; gap: 16px; padding: 16px 20px;
  background: white; border-radius: var(--r16); border: 1px solid var(--gray-200);
  box-shadow: var(--shadow-sm); width: fit-content;
}
.avatar-stack { display: flex; }
.avatar-stack span {
  width: 32px; height: 32px; border-radius: 50%; border: 2px solid white;
  margin-left: -10px; display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: white;
}
.avatar-stack span:first-child { margin-left: 0; }
.stars { display: inline-flex; align-items: center; gap: 2px; color: var(--amber); }

.hero-visual { position: relative; display: flex; justify-content: center; align-items: center; height: 480px; overflow: visible; }
.hero-visual-bg { position: absolute; width: 380px; height: 380px; background: radial-gradient(circle, rgba(27,79,216,.12), transparent 70%); border-radius: 50%; }
.card-img {
  position: absolute; border-radius: 16px; overflow: hidden;
  background-image: url(/escard-card-trim.png);
  background-repeat: no-repeat; background-position: center;
  background-size: cover; background-color: var(--blue);
}
.card-img-main {
  top: 40px; left: 0; width: 352px; height: 228px; z-index: 2;
  box-shadow: 0 28px 64px rgba(27,79,216,.45), 0 4px 16px rgba(27,79,216,.2);
  animation: cardSpin 6s ease-in-out infinite;
}
.card-img-secondary {
  bottom: 18px; right: 0; width: 280px; height: 181px; z-index: 1;
  box-shadow: 0 12px 40px rgba(0,0,0,.4);
}
.card-badge-ic { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.card-badge {
  position: absolute; z-index: 5; background: white; border: 1px solid var(--gray-200);
  border-radius: var(--r12); padding: 10px 14px; display: flex; align-items: center; gap: 10px;
  box-shadow: var(--shadow-lg); animation: float 4s ease-in-out infinite;
}

/* ============================================================
   STATS / LOGOS
   ============================================================ */
.stats-bar { background: white; border-top: 1px solid var(--gray-100); border-bottom: 1px solid var(--gray-100); }
.stats-grid { display: grid; grid-template-columns: repeat(4,1fr); }
.stat-item { padding: 36px 24px; text-align: center; border-right: 1px solid var(--gray-100); }
.stat-item:last-child { border-right: none; }
.stat-num { font-family: var(--font-display); font-size: 44px; font-weight: 900; letter-spacing: -2px; margin-bottom: 6px; line-height: 1; }
.stat-num .suf { color: var(--amber); }
.stat-label { font-size: 13px; color: var(--gray-400); font-weight: 500; }

.logos-bar { padding: 48px 0; background: var(--gray-50); border-bottom: 1px solid var(--gray-200); overflow: hidden; }
.logos-label { text-align: center; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--gray-400); margin-bottom: 28px; }

/* ── Ticker base ── */
.ticker-wrap { overflow: hidden; position: relative; }
.ticker-wrap::before, .ticker-wrap::after {
  content: ""; position: absolute; top: 0; bottom: 0; width: 80px; z-index: 2; pointer-events: none;
}
.ticker-wrap::before { left: 0; background: linear-gradient(to right, var(--gray-50), transparent); }
.ticker-wrap::after  { right: 0; background: linear-gradient(to left, var(--gray-50), transparent); }
.ticker-track { display: flex; width: max-content; }
.ticker-track.logos  { animation: ticker-ltr 28s linear infinite; }
.ticker-track.cards  { animation: ticker-ltr 36s linear infinite; }
.ticker-track:hover  { animation-play-state: paused; }

@keyframes ticker-ltr {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* ── Logo tiles no ticker ── */
.logo-tile {
  display: flex; align-items: center; justify-content: center;
  background: white; border: 1px solid var(--gray-200); border-radius: var(--r12);
  height: 140px; padding: 12px 16px; box-shadow: var(--shadow-sm);
  transition: box-shadow .25s ease, transform .25s ease, border-color .25s ease;
}
.logo-tile { flex-shrink: 0; }
.logo-tile:hover { box-shadow: var(--shadow-md); transform: translateY(-3px); border-color: var(--gray-300); }
.logo-tile img {
  max-width: 100%; max-height: 100%; width: 100%; height: 100%; object-fit: contain;
  filter: grayscale(0%); opacity: 1;
  transition: filter .3s ease, opacity .3s ease;
}
.logo-tile:hover img { filter: grayscale(0%); opacity: 1; }
@media (min-width: 960px) { .logo-tile { height: 120px; padding: 12px 18px; } }

/* ============================================================
   PRODUTOS
   ============================================================ */
.section { padding: 96px 0; }
.section-alt { background: var(--gray-50); }
.section-white { background: white; }

.filter-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 48px; flex-wrap: wrap; }
.filter-btn {
  padding: 9px 22px; border-radius: var(--r-full); border: 1.5px solid var(--gray-200);
  background: white; color: var(--gray-600); font-size: 13.5px; font-weight: 600; transition: all .2s;
}
.filter-btn.active { border-color: var(--blue); background: var(--blue); color: white; }

.produtos-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 22px; }
.produto-card {
  background: white; border: 1px solid var(--gray-200); border-radius: var(--r20);
  padding: 28px; cursor: pointer; position: relative; overflow: hidden; transition: all .22s ease;
}
.produto-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); }
.produto-badge {
  position: absolute; top: 18px; right: 18px; font-size: 11px; font-weight: 700;
  display: inline-flex; align-items: center; gap: 4px;
  background: rgba(245,158,11,.12); color: var(--amber-dark); padding: 3px 10px; border-radius: var(--r-full);
}
.produto-icon {
  width: 60px; height: 60px; border-radius: 16px; margin-bottom: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: transform .25s ease;
}
.produto-card:hover .produto-icon { transform: scale(1.06) rotate(-3deg); }
.produto-name { font-family: var(--font-display); font-size: 18px; font-weight: 800; color: var(--navy); margin-bottom: 6px; letter-spacing: -0.3px; }
.produto-desc { font-size: 13.5px; line-height: 1.6; color: var(--gray-500); margin-bottom: 18px; }
.produto-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
.produto-link { background: none; border: none; color: var(--blue); font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 4px; transition: gap .18s; }
.produto-link:hover { gap: 10px; }

/* ============================================================
   CALCULADORA
   ============================================================ */
.calc-section { padding: 96px 0; background: var(--navy); position: relative; overflow: hidden; }
.calc-bg {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 70% 60% at 30% 50%, rgba(27,79,216,.25), transparent 60%),
              radial-gradient(ellipse 50% 40% at 80% 80%, rgba(245,158,11,.08), transparent 55%);
  pointer-events: none;
}
.calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; position: relative; z-index: 1; }
.calc-feature-list { display: flex; flex-direction: column; gap: 14px; margin-top: 4px; }
.calc-feature { display: flex; align-items: flex-start; gap: 12px; }
.calc-feature-icon { width: 32px; height: 32px; background: rgba(16,185,129,.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--green); flex-shrink: 0; }
.calc-feature-title { font-size: 14px; font-weight: 700; color: white; margin-bottom: 2px; }
.calc-feature-sub { font-size: 12px; color: rgba(255,255,255,.45); }

.calc-box { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); border-radius: var(--r24); padding: 40px; backdrop-filter: blur(12px); }
.calc-slider-row { margin-bottom: 28px; }
.calc-slider-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.calc-slider-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: rgba(255,255,255,.5); }
.calc-slider-val { font-size: 14px; font-weight: 700; color: white; }
.calc-slider { width: 100%; accent-color: var(--blue); cursor: pointer; height: 6px; }

.calc-results { background: rgba(27,79,216,.15); border: 1px solid rgba(27,79,216,.3); border-radius: var(--r16); padding: 20px; margin-bottom: 20px; }
.calc-result-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,.06); }
 .calc-result-label { display: inline-flex; align-items: center; gap: 7px; font-size: 13px; color: rgba(255,255,255,.6); }
.calc-result-val { font-size: 16px; font-weight: 800; font-family: var(--font-display); }
.calc-total-row { display: flex; justify-content: space-between; align-items: center; padding-top: 14px; }
 .calc-total-label { display: inline-flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 700; color: rgba(255,255,255,.8); }
.calc-total-val { font-size: 26px; font-weight: 900; color: var(--amber); font-family: var(--font-display); letter-spacing: -1px; }
.calc-disclaimer { text-align: center; font-size: 11px; color: rgba(255,255,255,.25); margin-top: 10px; }
.calc-sim-tab-btn { padding: 10px 20px; border-radius: 999px; border: 1.5px solid var(--gray-200); background: #fff; color: var(--gray-500); font-size: 14px; font-weight: 700; cursor: pointer; transition: all .15s; }
.calc-sim-tab-btn:hover { border-color: var(--blue); color: var(--blue); }
.calc-sim-tab-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }
.calc-sim-pane { animation: fadeIn .2s ease; }

/* ============================================================
   COMO FUNCIONA / DIFERENCIAIS
   ============================================================ */
.steps-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 0; position: relative; }
.steps-line { position: absolute; top: 28px; left: 12.5%; right: 12.5%; height: 2px; background: linear-gradient(90deg, var(--blue), var(--amber)); border-radius: 2px; }
.step-item { text-align: center; padding: 0 16px; position: relative; z-index: 1; }
.step-icon {
  width: 56px; height: 56px; background: linear-gradient(135deg, var(--blue), var(--blue-light));
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  margin: 0 auto 20px; box-shadow: 0 4px 16px rgba(27,79,216,.35); color: white;
}
.step-title { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
.step-desc { font-size: 13px; color: var(--gray-500); line-height: 1.55; margin-bottom: 10px; }
.step-time { display: inline-block; font-size: 12px; font-weight: 700; color: var(--blue); background: var(--blue-pale); padding: 3px 10px; border-radius: var(--r-full); }

.diferenciais-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 24px; }
.diferencial-card { border-radius: var(--r20); padding: 32px; transition: all .22s ease; border: 1px solid var(--gray-200); background: white; box-shadow: var(--shadow-sm); }
.diferencial-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-lg); }
.diferencial-card.dark { background: linear-gradient(135deg, var(--navy), var(--navy-mid)); border-color: transparent; box-shadow: 0 20px 48px rgba(15,28,63,.25); }
.diferencial-card.dark:hover { transform: none; }
.diferencial-icon { width: 52px; height: 52px; border-radius: var(--r14); display: flex; align-items: center; justify-content: center; margin-bottom: 18px; background: var(--blue-pale); border: 1px solid rgba(27,79,216,.1); color: var(--blue); }
.diferencial-card.dark .diferencial-icon { background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.1); color: white; }
.diferencial-title { font-family: var(--font-display); font-size: 18px; font-weight: 800; color: var(--navy); margin-bottom: 10px; letter-spacing: -0.3px; }
.diferencial-card.dark .diferencial-title { color: white; }
.diferencial-desc { font-size: 14px; line-height: 1.65; color: var(--gray-500); }
.diferencial-card.dark .diferencial-desc { color: rgba(255,255,255,.6); }
.diferencial-tag { display: inline-flex; align-items: center; gap: 5px; margin-top: 14px; font-size: 11px; font-weight: 700; color: var(--amber); background: rgba(245,158,11,.12); padding: 4px 12px; border-radius: var(--r-full); }

/* ============================================================
   DEPOIMENTOS
   ============================================================ */
.depoimentos-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 24px; }
.depoimento-card {
  background: white; border: 1px solid var(--gray-200); border-radius: var(--r20);
  padding: 32px; position: relative; overflow: hidden; box-shadow: var(--shadow-sm); transition: all .22s ease;
}
.depoimento-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); }
.depoimento-quote { position: absolute; top: 20px; right: 24px; font-family: var(--font-display); font-size: 72px; color: var(--gray-100); line-height: 1; font-weight: 900; pointer-events: none; }
.depoimento-text { font-size: 14.5px; line-height: 1.75; color: var(--gray-600); margin-bottom: 22px; position: relative; z-index: 1; }
.depoimento-footer { display: flex; align-items: center; gap: 12px; }
.depoimento-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 16px; color: white; flex-shrink: 0; }
.depoimento-nome { font-size: 14px; font-weight: 700; color: var(--navy); }
.depoimento-cargo { font-size: 12px; color: var(--gray-400); }
.depoimento-empresa { font-size: 12px; color: var(--blue); font-weight: 600; }

/* ============================================================
   BLOG
   ============================================================ */
.blog-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 22px; }
.blog-grid-full { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 22px; }
.blog-card { background: white; border: 1px solid var(--gray-200); border-radius: var(--r20); overflow: hidden; cursor: pointer; box-shadow: var(--shadow-sm); transition: all .22s ease; }
.blog-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); }
.blog-thumb { display: flex; align-items: center; justify-content: center; }
.blog-content { padding: 20px; }
.blog-cat { display: inline-block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 3px 10px; border-radius: var(--r-full); margin-bottom: 10px; }
.blog-title { font-family: var(--font-display); font-weight: 800; color: var(--navy); line-height: 1.3; margin-bottom: 8px; letter-spacing: -0.3px; }
.blog-excerpt { font-size: 13.5px; color: var(--gray-500); line-height: 1.6; margin-bottom: 12px; }
.blog-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--gray-400); }
.blog-read { color: var(--blue); font-weight: 700; }
.blog-empty {
  background: white; border: 2px dashed var(--gray-200); border-radius: var(--r20);
  display: flex; align-items: center; justify-content: center; min-height: 200px; transition: all .22s ease;
}

/* ============================================================
   FAQ
   ============================================================ */
.faq-list { max-width: 780px; margin: 0 auto; }
.faq-item { border: 1px solid var(--gray-200); border-radius: var(--r14); margin-bottom: 10px; overflow: hidden; transition: all .2s; }
.faq-item.open { border-color: var(--blue); box-shadow: var(--shadow-md); }
.faq-question {
  display: flex; justify-content: space-between; align-items: center; width: 100%;
  padding: 18px 22px; background: none; border: none; cursor: pointer; text-align: left; gap: 16px;
}
.faq-question-text { font-size: 15px; font-weight: 600; color: var(--navy); }
.faq-item.open .faq-question-text { color: var(--blue); }
.faq-icon {
  width: 28px; height: 28px; border-radius: 50%; background: var(--gray-100);
  display: flex; align-items: center; justify-content: center; font-size: 18px;
  color: var(--gray-500); flex-shrink: 0; transition: all .2s;
}
.faq-item.open .faq-icon { background: var(--blue-pale); color: var(--blue); transform: rotate(45deg); }
.faq-answer { padding: 0 22px 18px; font-size: 14.5px; line-height: 1.7; color: var(--gray-600); }

/* ============================================================
   CTA FINAL
   ============================================================ */
.cta-final { padding: 96px 0; background: linear-gradient(135deg, var(--navy) 0%, #0F3580 50%, var(--navy) 100%); position: relative; overflow: hidden; text-align: center; }
.cta-final-glow { position: absolute; top: -60px; left: 50%; transform: translateX(-50%); width: 700px; height: 500px; background: radial-gradient(ellipse, rgba(27,79,216,.4), transparent 65%); pointer-events: none; }
.cta-final-inner { position: relative; z-index: 1; }
.cta-final-eyebrow { display: inline-block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,.45); margin-bottom: 16px; background: rgba(255,255,255,.06); padding: 6px 16px; border-radius: var(--r-full); }
.cta-final-title { font-family: var(--font-display); font-size: clamp(32px,4vw,54px); font-weight: 900; color: white; letter-spacing: -2px; margin-bottom: 18px; line-height: 1.08; }
.cta-final-title span { color: var(--amber); }
.cta-final-sub { font-size: 17px; color: rgba(255,255,255,.55); margin-bottom: 44px; max-width: 520px; margin-left: auto; margin-right: auto; }
.cta-final-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-bottom: 40px; }
.cta-final-trust { display: flex; align-items: center; justify-content: center; gap: 32px; flex-wrap: wrap; }
.cta-final-trust span { font-size: 13px; color: rgba(255,255,255,.4); display: flex; align-items: center; gap: 6px; }

/* ============================================================
   FORMULÁRIO
   ============================================================ */
.form-card { background: white; border: 1px solid var(--gray-200); border-radius: var(--r24); padding: 40px; box-shadow: var(--shadow-xl); }
.form-title { font-family: var(--font-display); font-size: 20px; font-weight: 800; color: var(--navy); margin-bottom: 6px; letter-spacing: -0.3px; }
.form-sub { font-size: 14px; color: var(--gray-400); margin-bottom: 24px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.form-field label { display: block; font-size: 12px; font-weight: 600; color: var(--gray-600); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.5px; }
.form-field input, .form-field select, .form-field textarea {
  width: 100%; padding: 12px 16px; border: 1.5px solid var(--gray-200); border-radius: var(--r12);
  font-size: 14px; color: var(--navy); outline: none; transition: border-color .18s, box-shadow .18s; background: white;
}
.form-field input:focus, .form-field select:focus, .form-field textarea:focus {
  border-color: var(--blue); box-shadow: 0 0 0 3px rgba(27,79,216,.1);
}
.form-lgpd { display: flex; align-items: center; justify-content: center; gap: 6px; text-align: center; font-size: 12px; color: var(--gray-300); margin-top: 12px; }
.form-or { display: flex; align-items: center; gap: 12px; margin: 14px 0; color: var(--gray-300); font-size: 12px; font-weight: 600; }
.form-or::before, .form-or::after { content: ""; flex: 1; height: 1px; background: var(--gray-200); }
.form-success { text-align: center; padding: 56px 32px; background: var(--green-pale); border: 1px solid rgba(16,185,129,.2); border-radius: var(--r20); }
.form-success-icon { font-size: 52px; margin-bottom: 18px; }
.form-success-title { font-family: var(--font-display); font-weight: 700; font-size: 22px; color: var(--navy); margin-bottom: 8px; }
.form-error { background: #FEF2F2; border: 1px solid rgba(239,68,68,.3); color: #B91C1C; border-radius: var(--r12); padding: 12px 16px; font-size: 13.5px; margin-bottom: 14px; }

/* ============================================================
   FOOTER
   ============================================================ */
.footer { background: var(--navy); padding: 72px 0 36px; border-top: 1px solid rgba(255,255,255,.06); }
.footer-grid { display: grid; grid-template-columns: 1.8fr 1fr 1fr 1fr; gap: 48px; margin-bottom: 56px; }
.footer-desc { font-size: 14px; color: rgba(255,255,255,.45); line-height: 1.75; max-width: 260px; margin-bottom: 24px; }
.footer-social { display: flex; gap: 8px; }
 .footer-social a { width: 36px; height: 36px; background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1); border-radius: var(--r8); display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,.8); transition: background .2s ease, color .2s ease; }
 .footer-social a:hover { background: rgba(255,255,255,.14); color: white; }
.footer-col-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,.35); margin-bottom: 18px; }
.footer-link-list { display: flex; flex-direction: column; gap: 8px; }
.footer-link { background: none; border: none; color: rgba(255,255,255,.55); font-size: 14px; cursor: pointer; transition: color .18s; padding: 0; text-align: left; }
.footer-link:hover { color: white; }
.footer-bottom { padding-top: 28px; border-top: 1px solid rgba(255,255,255,.07); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
.footer-bottom-text { font-size: 13px; color: rgba(255,255,255,.3); }
.footer-bottom-links { display: flex; gap: 20px; }
.footer-bottom-links button { background: none; border: none; font-size: 13px; color: rgba(255,255,255,.3); }

/* ============================================================
   WHATSAPP FLOAT
   ============================================================ */
.wa-float {
  position: fixed; bottom: 28px; right: 28px; z-index: 999;
  display: flex; align-items: center; gap: 10px;
  background: #25D366; color: white; font-size: 14px; font-weight: 700;
  padding: 13px 22px 13px 16px; border-radius: var(--r-full);
  box-shadow: 0 8px 28px rgba(37,211,102,.45); transition: all .22s ease;
}
.wa-float:hover { transform: translateY(-3px); box-shadow: 0 14px 40px rgba(37,211,102,.6); }

/* ============================================================
   PÁGINAS INTERNAS (hero secundário)
   ============================================================ */
.page-hero { padding: 72px 0 56px; background: var(--navy); text-align: center; }
.page-hero-title { font-family: var(--font-display); font-size: clamp(32px,4vw,52px); font-weight: 900; color: white; letter-spacing: -1.5px; margin-bottom: 14px; }
.page-hero-title span { color: var(--amber); }
.page-hero-sub { font-size: 17px; color: rgba(255,255,255,.55); max-width: 560px; margin: 0 auto; }
.page-hero-stats { background: linear-gradient(135deg, var(--blue), var(--blue-light)); padding: 28px 0; }
.page-hero-stats-grid { display: grid; grid-template-columns: repeat(3,1fr); text-align: center; }
.page-hero-stats-grid .n { font-family: var(--font-display); font-size: 42px; font-weight: 900; color: white; letter-spacing: -1.5px; margin-bottom: 6px; }
.page-hero-stats-grid .l { font-size: 14px; color: rgba(255,255,255,.7); max-width: 200px; margin: 0 auto; }

.sticky-filter { background: white; border-bottom: 1px solid var(--gray-200); padding: 18px 0; position: sticky; top: 68px; z-index: 100; }

/* Bem-estar feature blocks */
.bemestar-block { display: grid; grid-template-columns: 1fr 1fr; gap: 72px; align-items: center; margin-bottom: 96px; }
.bemestar-block:last-child { margin-bottom: 0; }
.bemestar-block.reverse > :first-child { order: 2; }
.bemestar-block.reverse > :last-child { order: 1; }
.bemestar-visual { background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: var(--r24); padding: 48px; text-align: center; }
 .bemestar-emoji { display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
.bemestar-nome { font-family: var(--font-display); font-size: 32px; font-weight: 900; color: var(--navy); margin-bottom: 6px; }
.bemestar-stat { font-family: var(--font-display); font-size: 52px; font-weight: 900; letter-spacing: -2px; margin-bottom: 4px; }
.bemestar-stat-label { font-size: 13px; color: var(--gray-400); }
.bemestar-tag { display: inline-block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; padding: 4px 14px; border-radius: var(--r-full); margin-bottom: 16px; }
.bemestar-feature { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--gray-600); margin-bottom: 10px; }
.bemestar-check { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; background: rgba(16,185,129,.15); color: var(--green); }

/* Private Label */
.pl-stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 20px; margin-bottom: 72px; }
.pl-stat-card { background: white; border: 1px solid var(--gray-200); border-radius: var(--r20); padding: 28px; text-align: center; box-shadow: var(--shadow-sm); transition: all .22s; }
.pl-stat-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); }
.pl-cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 48px; }
.pl-card { border-radius: var(--r20); padding: 44px; }
.pl-card.dark { background: linear-gradient(135deg, var(--navy), var(--navy-mid)); border: 1px solid rgba(255,255,255,.08); box-shadow: 0 20px 60px rgba(15,28,63,.3); }
.pl-card.light { background: var(--gray-50); border: 1px solid var(--gray-200); box-shadow: var(--shadow-sm); }
.pl-badge { display: inline-block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 4px 12px; border-radius: var(--r-full); margin-bottom: 22px; }
.pl-cta-block { background: linear-gradient(135deg, var(--navy), var(--navy-mid)); border-radius: var(--r20); padding: 52px; text-align: center; }

/* Cobrança */
.cobranca-stat { text-align: center; margin-bottom: 80px; }
.cobranca-stat-box { background: linear-gradient(135deg, var(--navy), var(--navy-mid)); display: inline-block; border-radius: var(--r24); padding: 48px 80px; }
.cobranca-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 22px; margin-bottom: 48px; }
.cobranca-card { background: white; border: 1px solid var(--gray-200); border-radius: var(--r20); padding: 28px; box-shadow: var(--shadow-sm); transition: all .22s; }
.cobranca-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
 .cobranca-icon { width: 48px; height: 48px; background: var(--blue-pale); border-radius: var(--r12); display: flex; align-items: center; justify-content: center; color: var(--blue); margin-bottom: 16px; border: 1px solid rgba(27,79,216,.1); }

/* Lojistas */
.lojista-benefit { display: flex; gap: 14px; margin-bottom: 22px; }
 .lojista-benefit-icon { width: 44px; height: 44px; background: var(--amber-pale); border-radius: var(--r12); display: flex; align-items: center; justify-content: center; color: var(--amber-dark); flex-shrink: 0; }

/* Quem Somos */
.quemsomos-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 32px; margin-bottom: 72px; }
.quemsomos-card { background: white; border: 1px solid var(--gray-200); border-radius: var(--r20); padding: 36px; text-align: center; box-shadow: var(--shadow-sm); transition: all .22s; }
.quemsomos-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
.quemsomos-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.quemsomos-stat-box { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.08); border-radius: var(--r16); padding: 24px; text-align: center; }

/* Contato */
.contato-grid { display: grid; grid-template-columns: 1fr 1.6fr; gap: 64px; }
.contato-info-item { display: flex; gap: 14px; margin-bottom: 22px; }
 .contato-info-icon { width: 44px; height: 44px; background: var(--blue-pale); border-radius: var(--r12); display: flex; align-items: center; justify-content: center; color: var(--blue); flex-shrink: 0; }
.contato-guarantee { margin-top: 24px; padding: 20px; background: var(--blue-pale); border: 1px solid rgba(27,79,216,.12); border-radius: var(--r12); }

/* ============================================================
   RESPONSIVO
   ============================================================ */
@media (max-width: 1024px) {
  .hide-lg { display: none !important; }
  .grid-1-on-md { grid-template-columns: 1fr !important; }
  .pl-stats-grid { grid-template-columns: repeat(2,1fr); }
}
@media (max-width: 768px) {
  .nav-links, .nav-actions { display: none !important; }
  .nav-hamburger { display: flex !important; }
  .hide-md { display: none !important; }
  .grid-1 { grid-template-columns: 1fr !important; }
  .stats-grid { grid-template-columns: repeat(2,1fr); }
  .stat-item:nth-child(2) { border-right: none; }
  .produtos-grid, .blog-grid, .blog-grid-full, .diferenciais-grid, .depoimentos-grid,
  .steps-grid, .quemsomos-grid, .pl-cards-grid, .cobranca-grid { grid-template-columns: 1fr; }
  .steps-line { display: none; }
  .footer-grid { grid-template-columns: 1fr 1fr; gap: 32px; }
  .blog-grid { grid-template-columns: 1fr; }
  .calc-grid, .bemestar-block, .contato-grid, .hero-grid, .page-hero-stats-grid { grid-template-columns: 1fr; }
  .bemestar-block.reverse > :first-child, .bemestar-block.reverse > :last-child { order: 0; }
  .page-hero-stats-grid { gap: 20px; }
  .wa-float { padding: 14px; bottom: 16px; right: 16px; }
  .wa-float span.wa-float-label { display: none; }
}
@media (max-width: 480px) {
  .footer-grid { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
}

/* ============================================================
   COMPARATIVO (sem nomes de concorrentes)
   ============================================================ */
.comp-table { width: 100%; border-collapse: collapse; border-radius: var(--r20); overflow: hidden; box-shadow: var(--shadow-lg); }
.comp-table th, .comp-table td { padding: 14px 18px; text-align: center; font-size: 14px; }
.comp-table thead { background: var(--navy); color: white; }
.comp-table thead th { font-family: var(--font-display); font-weight: 700; font-size: 13px; letter-spacing: 0.3px; }
.comp-table thead th.col-escard { background: var(--blue); color: white; }
.comp-table tbody tr:nth-child(odd) { background: white; }
.comp-table tbody tr:nth-child(even) { background: var(--gray-50); }
.comp-table tbody td { color: var(--gray-600); border-bottom: 1px solid var(--gray-100); }
.comp-table tbody td.col-escard { color: var(--blue); font-weight: 700; background: var(--blue-pale); }
.comp-table tbody tr:last-child td { border-bottom: none; }
.comp-table .row-label { text-align: left; font-weight: 600; color: var(--navy); font-size: 13.5px; }
.comp-check { color: var(--green); font-size: 18px; }
.comp-x { color: var(--gray-300); font-size: 18px; }
.comp-partial { color: var(--amber); font-size: 18px; }
.comp-badge-winner { display: inline-block; background: var(--blue); color: white; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: var(--r-full); letter-spacing: 0.5px; margin-left: 6px; vertical-align: middle; }

/* ============================================================
   LEAD MAGNET / CAPTURA SIMPLES
   ============================================================ */
.lead-bar { background: linear-gradient(135deg, var(--navy), #0F3580); padding: 32px 0; }
.lead-bar-inner { display: flex; align-items: center; gap: 28px; flex-wrap: wrap; justify-content: space-between; }
.lead-bar-text h3 { font-family: var(--font-display); font-size: 20px; font-weight: 800; color: white; letter-spacing: -0.3px; margin-bottom: 4px; }
.lead-bar-text p { font-size: 14px; color: rgba(255,255,255,.55); }
.lead-bar-form { display: flex; gap: 10px; flex-wrap: wrap; }
.lead-bar-form input { height: 46px; padding: 0 16px; border: none; border-radius: var(--r10); font-size: 14px; font-family: var(--font-body); width: 240px; outline: none; color: var(--navy); }
.lead-bar-form input:focus { box-shadow: 0 0 0 3px rgba(245,158,11,.5); }

/* ============================================================
   COMPARATIVO MOBILE
   ============================================================ */
@media (max-width: 768px) {
  .comp-table th, .comp-table td { padding: 10px 8px; font-size: 12px; }
  .lead-bar-inner { flex-direction: column; align-items: flex-start; gap: 16px; }
  .lead-bar-form input { width: 100%; }
  .lead-bar-form { width: 100%; }
  .lead-bar-form .btn { width: 100%; justify-content: center; }
}

/* ── Cards ticker ── */
.cards-ticker-section { padding: 0 0 56px; background: var(--gray-50); overflow: hidden; }
.cards-ticker-label { text-align: center; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--gray-400); padding: 8px 0 24px; }
.ticker-wrap.cards-wrap::before { background: linear-gradient(to right, var(--gray-50), transparent); }
.ticker-wrap.cards-wrap::after  { background: linear-gradient(to left, var(--gray-50), transparent); }

.card-item {
  flex-shrink: 0;
  width: 320px;
  height: 202px;
  margin: 0 24px;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 20px 48px rgba(10,31,68,.18), 0 6px 16px rgba(10,31,68,.10);
  transform: perspective(800px) rotateY(0deg) rotateX(0deg);
  transition: transform .4s ease, box-shadow .4s ease;
  cursor: pointer;
  background: #f0f4f8;
}
.card-item:hover {
  transform: perspective(800px) rotateY(0deg) rotateX(0deg) translateY(-8px);
  box-shadow: 0 32px 64px rgba(10,31,68,.22), 0 8px 24px rgba(10,31,68,.12);
}
.card-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

function ICON(name, size = 24) {
  const def = ICONS[name];
  if (!def) return "";
  const filled = typeof def === "object" && def.fill;
  const inner = filled ? def.p : def;
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="${filled ? "currentColor" : "none"}" stroke="${filled ? "none" : "currentColor"}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${inner}</svg>`;
}
function STARS(n = 5, size = 14) {
  return Array.from({ length: n }, () => ICON("star", size)).join("");
}

function renderProdutoCard(p) {
  return `
  <div class="produto-card card-stripe lift" data-cat="${p.cat}">
    ${p.destaque ? `<div class="produto-badge">${ICON("sparkles", 12)} Mais popular</div>` : ""}
    <div class="produto-icon" style="background:${p.cor}1a;color:${p.cor};box-shadow:0 8px 18px ${p.cor}26" role="img" aria-label="${esc(p.nome)}">${ICON(produtoIconName(p), 30)}</div>
    <div class="produto-name">${esc(p.nome)}</div>
    <p class="produto-desc">${esc(p.desc)}</p>
    <div class="produto-tags">${p.tags.map(t => `<span class="tag" style="background:${p.cor}1a;color:${p.cor}">${esc(t)}</span>`).join("")}</div>
    <button class="produto-link" data-action="nav" data-path="contato">Solicitar proposta →</button>
  </div>`;
}

function renderProdutosPreview() {
  const filterBtns = [["todos", "Todos"], ["alimentacao", "Alimentação"], ["corporativo", "Corporativo"], ["especial", "Especial"]]
    .map(([v, l], i) => `<button class="filter-btn${i === 0 ? " active" : ""}" data-action="filter-produtos" data-cat="${v}">${l}</button>`).join("");
  const cards = DATA_PRODUTOS.map(renderProdutoCard).join("");
  return `
  <section class="section section-white">
    <div class="container">
      ${SH({ eyebrow: "Portfólio", title: "Soluções para cada necessidade<br>da sua empresa", sub: "Do cartão de alimentação ao private label, do bem-estar ao controle de frota — tudo em um parceiro." })}
      <div class="filter-row" id="produtosFiltro">${filterBtns}</div>
      <div class="produtos-grid" id="produtosGrid">${cards}</div>
    </div>
  </section>`;
}

function renderCalculadora() {
  return `
  <section class="calc-section" id="calc">
    <div class="calc-bg"></div>
    <div class="container calc-grid grid-1-on-md">
      <div>
        ${SH({ eyebrow: "Simulador PAT", title: "Quanto sua empresa<br>economiza com benefícios?", sub: "Isenção de INSS, FGTS e dedução dupla no IRPJ. Calcule o impacto real agora.", dark: true, align: "left" })}
        <div class="calc-feature-list">
          ${[["Isenção de INSS e FGTS", "Sobre valores de VA e VR no PAT"], ["Dedução dupla no IRPJ", "Benefício fiscal significativo"], ["Taxa zero de emissão", "Sem custo de cartão"], ["Ativação em 24h", "Suporte local e ágil"]]
            .map(([t, s]) => `
            <div class="calc-feature">
              <div class="calc-feature-icon">${ICON("check", 18)}</div>
              <div><div class="calc-feature-title">${t}</div><div class="calc-feature-sub">${s}</div></div>
            </div>`).join("")}
        </div>
      </div>
      <div class="calc-box">
        <div class="calc-slider-row">
          <div class="calc-slider-head"><label class="calc-slider-label">Colaboradores</label><span class="calc-slider-val" id="calcColabsVal">50 colaboradores</span></div>
          <input type="range" class="calc-slider" id="calcColabs" min="5" max="500" step="5" value="50">
        </div>
        <div class="calc-slider-row">
          <div class="calc-slider-head"><label class="calc-slider-label">Benefício por colaborador</label><span class="calc-slider-val" id="calcValorVal">R$ 700/mês</span></div>
          <input type="range" class="calc-slider" id="calcValor" min="300" max="2000" step="50" value="700">
        </div>
        <div class="calc-results">

// ---------- Navbar scroll shadow ----------
function attachScrollSpy() {
  const nav = document.getElementById("navbar");
  if (!nav) return;

  onScroll();
  window.addEventListener("scroll", onScroll, { passive: true });
}

// ---------- Fade up on scroll ----------
let observerInstance = null;
function attachFadeUpObserver() {
  if (typeof IntersectionObserver === "undefined") return;
  if (observerInstance) observerInstance.disconnect();
  observerInstance = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) entry.target.classList.add("vis");
    });
  }, { threshold: 0.1 });
  document.querySelectorAll(".produto-card, .diferencial-card, .depoimento-card, .blog-card, .pl-stat-card, .cobranca-card, .quemsomos-card").forEach(el => {
    el.classList.add("fade-up");
    observerInstance.observe(el);
  });
}

// ---------- Calculadora ROI ----------
function initSimuladorReceita() {
  const cartoesEl = document.getElementById("simCartoes");
  const ticketEl = document.getElementById("simTicket");
  if (!cartoesEl || !ticketEl) return;

  function update() {
    const pl = window.ESCARD.DATA_SIMULADOR.pl;
    const cartoes = +cartoesEl.value || 0;
    const ticket = +ticketEl.value || 0;

    // Fórmula idêntica à ferramenta interna (calcPL):
    const vgm = cartoes * ticket;
    const recMDR = vgm * (pl.mdr / 100);
    const carteiraParc = vgm * (pl.parc / 100) * 3;
    const recJuro = carteiraParc * (pl.juro / 100);
    const recAnuidade = cartoes * pl.anuidade;
    const recProd = vgm * (pl.prod / 100);
    const recFin = vgm * (pl.fin / 100);
    const recBruta = recMDR + recJuro + recAnuidade + recProd + recFin;

    const cartInad = vgm * (pl.inad / 100);
    const recMora = cartInad * (pl.mora / 100);
    const recMulta = cartInad * (pl.multa / 100);
    const recEncFin = cartInad * (pl.encfin / 100);
    const totalEnc = recMora + recMulta + recEncFin;
    const perdaInad = cartInad * 0.5;

    const recLiq = Math.max(recBruta + totalEnc - perdaInad, 0);

    document.getElementById("simVolume").textContent = fmtBRL(vgm);
    document.getElementById("simMes").textContent = fmtBRL(recLiq);
    document.getElementById("simAno").textContent = fmtBRL(recLiq * 12);
  }
  cartoesEl.addEventListener("input", update);
  ticketEl.addEventListener("input", update);
  update();
}

// ---------- Helpers de renda fixa (idênticos à ferramenta interna) ----------
function calcIRRegressivo(prazo) {
  if (prazo <= 180) return 0.225;
  if (prazo <= 360) return 0.200;
  if (prazo <= 720) return 0.175;
  return 0.150;
}
const IOF_TABLE_REGRESSIVO = [96,93,90,86,83,80,76,73,70,66,63,60,56,53,50,46,43,40,36,33,30,26,23,20,16,13,10,6,3,0];
function calcIOFRegressivo(prazo) {
  const dia = Math.min(Math.max(Math.round(prazo), 1), 30) - 1;
  return IOF_TABLE_REGRESSIVO[dia] / 100;
}
function calcRendaFixa(saldo, cdiAnual, pctCDI, prazo, isento) {
  const taxaBruta = (cdiAnual / 100) * (pctCDI / 100);
  const taxaDiaria = Math.pow(1 + taxaBruta, 1 / 252) - 1;
  const rendBruto = saldo * (Math.pow(1 + taxaDiaria, prazo) - 1);
  const iof = prazo < 30 ? rendBruto * calcIOFRegressivo(prazo) : 0;
  const baseIR = rendBruto - iof;
  const ir = isento ? 0 : baseIR * calcIRRegressivo(prazo);
  const liquido = rendBruto - iof - ir;
  return { bruto: rendBruto, iof, ir, liquido };
}

// ---------- Simulador Private Pós (cartão + float em renda fixa) ----------
function initSimuladorPos() {
  const cartoesEl = document.getElementById("simPosCartoes");
  const ticketEl = document.getElementById("simPosTicket");
  if (!cartoesEl || !ticketEl) return;

  function update() {
    const pos = window.ESCARD.DATA_SIMULADOR.pos;
    const cartoes = +cartoesEl.value || 0;
    const ticket = +ticketEl.value || 0;

    // Receita do cartão — fórmula idêntica à ferramenta interna (calcPOS)
    const vgm = cartoes * ticket;
    const recMDR = vgm * (pos.mdr / 100);
    const carteiraParc = vgm * (pos.parc / 100) * 3;
    const recJuro = carteiraParc * (pos.juro / 100);
    const recAnuidade = cartoes * pos.anuidade;
    const recProd = vgm * (pos.prod / 100);
    const recFin = vgm * (pos.fin / 100);
    const recBruta = recMDR + recJuro + recAnuidade + recProd + recFin;

    const cartInad = vgm * (pos.inad / 100);
    const recMora = cartInad * (pos.mora / 100);
    const recMulta = cartInad * (pos.multa / 100);
    const recEncFin = cartInad * (pos.encfin / 100);
    const totalEnc = recMora + recMulta + recEncFin;
    const perdaInad = cartInad * 0.5;
    const recCardLiq = Math.max(recBruta + totalEnc - perdaInad, 0);

    // Float em renda fixa — compara CDB, LCI/LCA, Tesouro Selic e IPCA+ (97% CDI), usa o melhor
    const saldoFloat = vgm * (pos.pctFloat / 100) * (pos.dias / 30);
    const prazoDias = pos.prazoDias || 30;
    const rfCDB = calcRendaFixa(saldoFloat, pos.cdi, pos.cdbPct, prazoDias, false);
    const rfLCI = calcRendaFixa(saldoFloat, pos.cdi, pos.lciPct, prazoDias, true);
    const rfSelic = calcRendaFixa(saldoFloat, pos.cdi, pos.selicPct, prazoDias, false);
    const rfIPCA = calcRendaFixa(saldoFloat, pos.cdi, 97, prazoDias, false);
    const opts = [rfCDB, rfLCI, rfSelic, rfIPCA];
    const recFloat = opts.reduce((max, o) => (o.liquido > max ? o.liquido : max), 0);

    const recTotalLiq = recCardLiq + recFloat;

    document.getElementById("simPosVolume").textContent = fmtBRL(vgm);
    document.getElementById("simPosCartao").textContent = fmtBRL(recCardLiq);
    document.getElementById("simPosFloat").textContent = fmtBRL(recFloat);
    document.getElementById("simPosMes").textContent = fmtBRL(recTotalLiq);
    document.getElementById("simPosAno").textContent = fmtBRL(recTotalLiq * 12);
  }
  cartoesEl.addEventListener("input", update);
  ticketEl.addEventListener("input", update);
  update();
}

// ---------- Simulador Consignado (funcionários × adesão, funding, spread) ----------
function initSimuladorConsignado() {
  const funcEl = document.getElementById("simConsFunc");
  const valorEl = document.getElementById("simConsValor");
  if (!funcEl || !valorEl) return;

  function update() {
    const cons = window.ESCARD.DATA_SIMULADOR.cons;
    const func = +funcEl.value || 0;
    const valor = +valorEl.value || 0;

    // Fórmula idêntica à ferramenta interna (calcCons)
    const contratos = Math.round(func * (cons.adesao / 100));
    const carteira = contratos * valor;
    const recJuros = carteira * (cons.taxa / 100);
    const custFund = carteira * (cons.fund / 100);

    const cartInad = carteira * (cons.inad / 100);
    const recMora = cartInad * (cons.mora / 100);
    const recMulta = cartInad * (cons.multa / 100);
    const recEncFin = cartInad * (cons.encfin / 100);
    const totalEnc = recMora + recMulta + recEncFin;
    const perdaInad = cartInad * 0.4;

    const recLiq = Math.max(recJuros + totalEnc - custFund - perdaInad, 0);

    document.getElementById("simConsCarteira").textContent = fmtBRL(carteira);
    document.getElementById("simConsMes").textContent = fmtBRL(recLiq);
    document.getElementById("simConsAno").textContent = fmtBRL(recLiq * 12);
  }
  funcEl.addEventListener("input", update);
  valorEl.addEventListener("input", update);
  update();
}

// ---------- Troca de abas do simulador (PL / Pós / Consignado) ----------
function initSimuladorTabs() {
  const tabs = document.querySelectorAll('[data-action="sim-tab"]');

// ---------- Envio de formulários para o Worker (Cloudflare D1) ----------
async function submitLead(form, kind) {
  const formData = new FormData(form);
  const payload = { tipo: kind, criado_em: new Date().toISOString(), origem: "site" };
  formData.forEach((value, key) => { payload[key] = value; });

  // Normaliza os campos do formulário de lojista para as colunas padrão
  if (kind === "lojista") {
    payload.nome = payload.responsavel || payload.nome;
    payload.empresa = payload.estabelecimento || payload.empresa;
    payload.whatsapp = payload.telefone || payload.whatsapp;
    payload.interesse = payload.segmento || payload.interesse;
  }

  const submitBtn = form.querySelector("button[type=submit]");
  const errorBoxId = kind === "contato" ? "contatoFormError" : "lojistaFormError";
  const errorBox = document.getElementById(errorBoxId);
  if (errorBox) errorBox.innerHTML = "";

  const originalText = submitBtn.textContent;
  submitBtn.disabled = true;
  submitBtn.textContent = "Enviando...";

  try {
    const res = await fetch(CONFIG.leadsUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    if (!res.ok) {
      const text = await res.text().catch(() => "");
      throw new Error(`Worker respondeu ${res.status}${text ? ": " + text : ""}`);
    }
    const wrapId = kind === "contato" ? "contatoFormWrap" : "lojistaFormWrap";
    const wrap = document.getElementById(wrapId);
    if (wrap) {
      wrap.innerHTML = `
        <div class="form-success">
          <div class="form-success-icon" style="color:var(--green)">${ICON("check", 40)}</div>
          <div class="form-success-title">${kind === "contato" ? "Proposta enviada!" : "Solicitação enviada!"}</div>
          <p style="color:var(--gray-500)">Nosso especialista entra em contato em até ${kind === "contato" ? "4 horas" : "24h"}. Fique de olho no WhatsApp!</p>
        </div>`;
    }
  } catch (err) {
    submitBtn.disabled = false;
    submitBtn.textContent = originalText;
    if (errorBox) {
      errorBox.innerHTML = `<div class="form-error">⚠️ Não foi possível enviar agora (${esc(err.message)}). Verifique sua conexão ou tente novamente em alguns instantes — ou fale direto pelo WhatsApp flutuante.</div>`;
    }
  }
}
function esc(s) { return E.esc(s); }

// ---------- Monta mensagem de WhatsApp a partir do formulário ----------
function whatsappFromForm(form, kind) {
  const f = new FormData(form);
  const g = (k) => (f.get(k) || "").toString().trim();
  let linhas;
  if (kind === "lojista") {
    linhas = [
      "Olá! Quero credenciar meu estabelecimento na ES Card.",
      "",
      `*Estabelecimento:* ${g("estabelecimento") || "—"}`,
      `*Responsável:* ${g("responsavel") || "—"}`,
      `*Telefone:* ${g("telefone") || "—"}`,
      `*Segmento:* ${g("segmento") || "—"}`,
    ];
  } else {
    linhas = [
      "Olá! Quero uma proposta da ES Card.",
      "",
      `*Nome:* ${g("nome") || "—"}`,
      `*Empresa:* ${g("empresa") || "—"}`,
      `*WhatsApp:* ${g("whatsapp") || "—"}`,
      `*E-mail:* ${g("email") || "—"}`,
      `*Nº Colaboradores:* ${g("colaboradores") || "—"}`,
      `*Interesse:* ${g("interesse") || "—"}`,
    ];
    const msg = g("mensagem");
    if (msg) linhas.push(`*Mensagem:* ${msg}`);
  }
  return window.ESCARD.waLink(linhas.join("\n"));
}

// ---------- Event delegation global ----------
document.addEventListener("click", (e) => {
  const target = e.target.closest("[data-action]");
  if (!target) return;
  const action = target.dataset.action;

  if (action === "nav") {
    e.preventDefault();
    // Fecha o menu mobile ao navegar
    const mm = document.getElementById("mobileMenu");
    if (mm && !mm.hasAttribute("hidden")) { mm.setAttribute("hidden", ""); document.body.style.overflow = ""; }
    // Fecha o dropdown aberto
    document.querySelectorAll(".nav-dropdown.open").forEach(d => d.classList.remove("open"));
    E.navigate(target.dataset.path);
  } else if (action === "toggle-dropdown") {
    // No mobile/touch, alterna o dropdown ao tocar no "Soluções"
    if (e.target.closest(".nav-dd-item")) return; // clique num item já é tratado por "nav"
    target.classList.toggle("open");
  } else if (action === "wa-form") {
    e.preventDefault();
    const form = document.getElementById(target.dataset.formId);
    if (form) {
      const url = whatsappFromForm(form, target.dataset.kind);
      window.open(url, "_blank", "noopener");
    }
  } else if (action === "toggle-mobile-menu") {
    const menu = document.getElementById("mobileMenu");
    const isHidden = menu.hasAttribute("hidden");
    if (isHidden) { menu.removeAttribute("hidden"); document.body.style.overflow = "hidden"; }
    else { menu.setAttribute("hidden", ""); document.body.style.overflow = ""; }
  } else if (action === "scroll-to") {
    const el = document.getElementById(target.dataset.target);
    if (el) el.scrollIntoView({ behavior: "smooth" });
  } else if (action === "filter-produtos" || action === "filter-produtos-page") {
    const cat = target.dataset.cat;
    const scope = action === "filter-produtos" ? "produtosFiltro" : "produtosPageFiltro";
    const gridId = action === "filter-produtos" ? "produtosGrid" : "produtosPageGrid";
    document.querySelectorAll(`#${scope} .filter-btn`).forEach(b => b.classList.remove("active"));
    target.classList.add("active");
    document.querySelectorAll(`#${gridId} .produto-card`).forEach(card => {
      card.style.display = (cat === "todos" || card.dataset.cat === cat) ? "" : "none";
    });
  } else if (action === "toggle-faq") {
    const item = target.closest(".faq-item");
    const wasOpen = item.classList.contains("open");
    document.querySelectorAll(".faq-item").forEach(i => {
      i.classList.remove("open");
      i.querySelector(".faq-answer-wrap").style.display = "none";
    });
    if (!wasOpen) {
      item.classList.add("open");
      item.querySelector(".faq-answer-wrap").style.display = "block";
    }
  }
});

document.addEventListener("submit", (e) => {
  const form = e.target.closest("[data-form]");
  if (!form) return;
  e.preventDefault();
  submitLead(form, form.dataset.form);
});

// ---------- Carrega conteúdo editável do banco antes de renderizar ----------
async function loadRemoteContent() {
  try {
    const res = await fetch("/api/content", { cache: "no-store" });
    if (!res.ok) return;
    const payload = await res.json();
    const content = (payload && payload.content) || {};
    const ES = window.ESCARD;
    // Objeto: mescla propriedades (mantém a mesma referência)
    if (content.empresa && typeof content.empresa === "object") {
      Object.assign(ES.DATA_EMPRESA, content.empresa);
    }
    // Arrays: substitui o conteúdo no lugar (mantém a mesma referência)
    const arrays = {
      stats: ES.DATA_STATS,
      produtos: ES.DATA_PRODUTOS,
      depoimentos: ES.DATA_DEPOIMENTOS,
      faq: ES.DATA_FAQ,
      blog: ES.DATA_BLOG,
    };
    for (const key in arrays) {
      if (Array.isArray(content[key]) && Array.isArray(arrays[key])) {
        arrays[key].length = 0;
        content[key].forEach((item) => arrays[key].push(item));
      }
    }
    // Taxas dos simuladores (objeto): mescla as taxas salvas no admin
    if (content.simulador && typeof content.simulador === "object") {
      if (content.simulador.pl && typeof content.simulador.pl === "object") {
        Object.assign(ES.DATA_SIMULADOR.pl, content.simulador.pl);
      }
      if (content.simulador.pos && typeof content.simulador.pos === "object") {
        Object.assign(ES.DATA_SIMULADOR.pos, content.simulador.pos);
      }
      if (content.simulador.cons && typeof content.simulador.cons === "object") {
        Object.assign(ES.DATA_SIMULADOR.cons, content.simulador.cons);
      }
    }
  } catch (err) {
    // Em caso de falha, o site usa o conteúdo padrão embutido
    console.log("[v0] Conteúdo remoto indisponível, usando padrão:", err && err.message);
  }
}

window.addEventListener("hashchange", renderApp);
window.addEventListener("DOMContentLoaded", function () {
  loadRemoteContent().then(renderApp);
});
if (document.readyState !== "loading") {
  loadRemoteContent().then(renderApp);
}

})();
